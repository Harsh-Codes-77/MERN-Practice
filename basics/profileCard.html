<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>
    <style>
        .box{
            width: 300px;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 20px 100px rgba(0, 0, 0, 0.2);
            margin: 50px auto;
            background-color: #f9f9f9;
        }
        .box .circle img{
            width: 103%;
            height: 110%;
            object-fit: cover;
            image-rendering: pixelated;
        }
        .box .circle{
            width: 100px;
            height: 100px;
            border: 2px solid #ccc;
            border-radius: 50%;
            overflow: hidden;
            margin: 0 auto 20px;

        }
        .box button{
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background-color: #007BFF;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>Profile Card</h1>
        <div class="circle">
            <img src="Avatar.png" alt="Profile Image">
        </div>
        <h2>Harsh Pathak</h2>
        <p>Software Engineer</p>
        <button>Follow</button>
    </div>
</body>
</html>
